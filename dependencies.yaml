# Dependency registry for neml2.
# Use scripts/dep_manager.py to check and update these dependencies.
#
# Schema per entry:
#   DEP_NAME:
#     FIELD: VALUE          # any scalar field (version, version_min, ...)
#     files:                # source files that embed this dep's value fields
#       - RELATIVE_PATH     # one entry per file; all # dependencies: DEP.FIELD
#                           # annotations within it are updated automatically
#
# Annotation convention in source files:
#   # dependencies: DEP_NAME.FIELD
#   <line containing the version value>

# ---- Python packages ----
torch:
  version: "2.12.0"
  version_min: "2.10.0"
  version_max: "2.12.0"
  files:
    - .github/actions/neml2-ci/action.yml
    - .github/workflows/cpp.yml
    - .github/workflows/python.yml
    - .github/workflows/notebooks.yml
    - .github/workflows/docs.yml
    - compatibility.yaml
    - pyproject.toml

pyzag:
  version: "1.1.1"
  files:
    - pyproject.toml
    - .github/workflows/compat.yml

nmhit:
  # Runtime floor for the nmhit Python package (HIT parser bindings used by
  # `neml2.factory`). The HIT parser is Python-side; CMakeLists.txt does
  # not pin it.
  version_min: "0.2.2"
  files:
    - pyproject.toml

# ---- Formatters / pre-commit hooks ----
clang_format:
  version: "v22.1.3"
  files:
    - .pre-commit-config.yaml

ruff:
  # No `v` prefix: this is the bare semver, which substring-matches both the
  # `rev: v0.15.13` style used by pre-commit and the `ruff==0.15.13` style
  # used by pip in pyproject.toml.
  version: "0.15.13"
  files:
    - .pre-commit-config.yaml
    - pyproject.toml

# ---- Type checkers ----
pyright:
  version: "1.1.409"
  files:
    - pyproject.toml

jupytext:
  version: "v1.19.1"
  files:
    - .pre-commit-config.yaml

# ---- C++ libraries ----
# nlohmann_json is now a git submodule at `contrib/nlohmann_json-src` (pinned
# via the submodule SHA, not a version string), so it doesn't appear here.

# ---- Build tools ----
cmake:
  version_min: "3.26.1"
  files:
    - .github/actions/neml2-ci/action.yml
    - CMakeLists.txt
    - .github/workflows/cpp.yml
    - .github/workflows/python.yml
    - .github/workflows/notebooks.yml
    - .github/workflows/docs.yml
    - pyproject.toml

python:
  version_min: "3.10"
  files:
    - .github/actions/neml2-ci/action.yml
    - .github/workflows/deps.yml
    - .github/workflows/copyright.yml
    - .github/workflows/cpp.yml
    - .github/workflows/python.yml
    - .github/workflows/notebooks.yml
    - .github/workflows/docs.yml
    - pyproject.toml

# ---- Project version ----
neml2:
  version: "3.0.1"
  files:
    - CMakeLists.txt
    - pyproject.toml
