[build-system]
requires = ["scikit-build-core"]
build-backend = "scikit_build_core.build"

[tool.scikit-build]
minimum-version = "0.10"
# dependencies: cmake.version_min
cmake.version = ">=3.26.1"
cmake.build-type = "Release"
ninja.version = ">=1.11"
ninja.make-fallback = false
sdist.exclude = [
  ".github",
  ".clang-format",
  ".clang-tidy",
  ".codechecker",
  ".gitattributes",
  ".gitignore",
  ".gitmodules",
  ".jupytext.toml",
  ".pre-commit-config.yaml",
  "scripts",
]
build-dir = "build/{wheel_tag}"
build.targets = ["pyneml2", "tools"]
wheel.install-dir = "neml2"

[tool.scikit-build.cmake.define]
NEML2_WHEEL = "ON"
NEML2_TESTS = "OFF"
NEML2_TOOLS = "ON"
NEML2_WORK_DISPATCHER = "OFF"
NEML2_JSON = "ON"
NEML2_CSV = "ON"

[project]
name = "neml2"
# dependencies: neml2.version
version = "2.1.3"
authors = [
  { name = "Mark Messner", email = "messner@anl.gov" },
  { name = "Gary Hu", email = "thu@anl.gov" },
]
description = "GPU-enabled vectorized material modeling library"
readme = "README.md"
# dependencies: python.version_min
requires-python = ">=3.10"
dependencies = [
  "torch",
  # dependencies: pyzag.version
  "pyzag==1.1.1",
  # dependencies: nmhit.version
  "nmhit>=0.1.2",
]

[project.optional-dependencies]
dev = [
  # testing
  "pytest",
  "pytest-xdist",
  "nbmake",
  # doc
  # dependencies: pybind11_stubgen.version_min
  "pybind11-stubgen>=2.5.5",
  "PyYAML",
  "matplotlib",
  "numpy",
  "scipy",
  "pandas",
  "loguru",
  "pyro-ppl",
  "tqdm",
  "nbconvert",
  "nbformat",
  "livereload",
  # git
  "pre-commit",
]

[project.scripts]
neml2-diagnose = "neml2._cli:diagnose"
neml2-inspect = "neml2._cli:inspect"
neml2-run = "neml2._cli:run"
neml2-syntax = "neml2._cli:syntax"
neml2-time = "neml2._cli:time"
neml2-stub = "neml2._cli:stub"

[tool.uv]
no-build-isolation-package = ["neml2"]

[tool.black]
line-length = 100

[tool.cibuildwheel]
build = "cp310-* cp311-* cp312-* cp313-* cp314-*"
skip = "*win* *manylinux_i686 *manylinux_aarch64 *manylinux_ppc64le *manylinux_s390x *manylinux_armv7l *musllinux*"

environment = { CMAKE_GENERATOR = "Ninja" }
build-verbosity = 1
build-frontend = {name = "build", args = ["--no-isolation"]}

before-all = ""
# dependencies: pybind11_stubgen.version_min
before-build = "python -m pip install scikit-build-core ninja torch pybind11-stubgen>=2.5.5 wheel"

# dependencies: pyzag.version
test-requires = "pytest torch pyzag==1.1.1"
test-command = "pytest -v {project}/python/tests"

[tool.cibuildwheel.linux]
repair-wheel-command = "python {project}/scripts/repair_wheel.py {wheel} {dest_dir}"

[tool.cibuildwheel.macos]
repair-wheel-command = "python {project}/scripts/repair_wheel.py {wheel} {dest_dir}"
