repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    # dependencies: clang_format.version
    rev: v22.1.3
    hooks:
    -   id: clang-format
        files: \.(cxx|h)$
        pass_filenames: true
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # dependencies: ruff.version
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
        files: \.py$
        exclude: ^(contrib|build|installed|notebooks)/
      - id: ruff-format
        files: \.py$
        exclude: ^(contrib|build|installed|notebooks)/
  - repo: https://github.com/mwouts/jupytext
    # dependencies: jupytext.version
    rev: v1.19.1
    hooks:
      - id: jupytext
        args: [--sync]
        files: ^notebooks/.*\.ipynb$
        pass_filenames: true
  - repo: local
    hooks:
      - id: nmhit-format
        name: nmhit-format
        entry: nmhit-format
        language: system
        files: \.i$
        types: [text]
      - id: check-copyright
        name: check copyright headers
        entry: scripts/check_copyright.py --modify
        language: script
        pass_filenames: true
        files: \.(h|cxx|py|sh|js)$
      - id: check-dependencies
        name: check dependency consistency
        entry: scripts/dep_manager.py check
        language: script
        pass_filenames: false
        always_run: true
      - id: check-compat-matrix
        name: check torch compatibility matrix is internally consistent
        entry: scripts/compat_matrix.py check
        language: script
        pass_filenames: false
        always_run: true
      - id: render-compat-matrix
        name: rerender torch compatibility matrix table
        entry: scripts/compat_matrix.py render --in-place doc/content/installation/compatibility.md
        language: script
        pass_filenames: false
        files: ^(compatibility\.yaml|doc/content/installation/compatibility\.md|scripts/compat_matrix\.py)$
