repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.3
    hooks:
    -   id: clang-format
        files: \.(cxx|h)$
        pass_filenames: true
  - repo: https://github.com/mwouts/jupytext
    rev: v1.19.1
    hooks:
      - id: jupytext
        args: [--sync]
        files: ^python/examples/.*\.ipynb$
        pass_filenames: true
        additional_dependencies:
          - nbformat==5.10.4
