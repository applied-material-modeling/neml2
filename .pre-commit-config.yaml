repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    # dependencies: clang_format.version
    rev: v22.1.3
    hooks:
    -   id: clang-format
        files: \.(cxx|cpp|h)$
        pass_filenames: true
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # dependencies: ruff.version
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
        files: \.py$
        exclude: ^(contrib|build|installed)/
      - id: ruff-format
        # Format ``.ipynb`` code cells too. Linting (``id: ruff`` above) stays
        # ``.py``-only so per-cell scoping artifacts (unused-import in early
        # cells re-imported later, etc.) don't bury notebook diffs in
        # spurious autofixes.
        files: \.(py|ipynb)$
        exclude: ^(contrib|build|installed)/
  - repo: local
    hooks:
      - id: check-notebook-executed
        name: check notebook cells are executed
        # The expensive notebooks rendered from pre-baked outputs (excluded
        # from build-time execution in ``doc/conf.py``) must stay fully
        # executed -- an unexecuted cell would render empty or stale. These
        # are the two pyzag calibration tutorials plus the physics-module
        # worked examples (KWN 316H precipitation / Al-Cu TTP and the crystal
        # plasticity formulations / pole figures). The cheap tutorial
        # notebooks are executed at build (``nb_execution_mode = "cache"``)
        # and committed without outputs, so they are deliberately NOT checked
        # here. Mirrors v2's check at ``doc/scripts/examples.py``.
        entry: doc/scripts/check_notebook_executed.py
        language: script
        files: >-
          ^doc/content/(tutorials/optimization/(deterministic|statistical)/main|modules/kwn/(precipitation_316h|al_cu_ttp)|modules/solid_mechanics/crystal_plasticity/(formulations|polefigures))\.ipynb$
        pass_filenames: true
      - id: nmhit-format
        name: nmhit-format
        entry: nmhit-format
        language: system
        files: \.i$
        types: [text]
      - id: check-copyright
        name: check copyright headers
        entry: scripts/check_copyright.py --modify
        language: script
        pass_filenames: true
        files: \.(h|cxx|cpp|py|sh|js)$
      - id: check-dependencies
        name: check dependency consistency
        entry: scripts/dep_manager.py check
        language: script
        pass_filenames: false
        always_run: true
      - id: check-compat-matrix
        name: check torch compatibility matrix is internally consistent
        entry: scripts/compat_matrix.py check
        language: script
        pass_filenames: false
        always_run: true
      - id: render-compat-matrix
        name: rerender torch compatibility matrix table
        entry: scripts/compat_matrix.py render --in-place doc/content/installation/compatibility.md
        language: script
        pass_filenames: false
        files: ^(doc/content/installation/compatibility\.(yaml|md)|scripts/compat_matrix\.py)$
  - repo: https://github.com/rhysd/actionlint
    # actionlint is pinned manually -- it's a hook-only release, not a Python
    # package, so the dep_manager.py registry doesn't track it.
    rev: v1.7.12
    hooks:
      - id: actionlint
        # Workflow files only. Composite-action ``action.yaml`` files have a
        # different schema that actionlint's workflow validator rejects.
        files: ^\.github/workflows/.*\.ya?ml$
