repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    # dependencies: clang_format.version
    rev: v22.1.3
    hooks:
    -   id: clang-format
        files: \.(cxx|h)$
        pass_filenames: true
  - repo: https://github.com/psf/black-pre-commit-mirror
    # dependencies: black.version
    rev: 25.11.0
    hooks:
      - id: black
        files: ^python/(neml2|tests)/.*\.py$
  - repo: https://github.com/mwouts/jupytext
    # dependencies: jupytext.version
    rev: v1.19.1
    hooks:
      - id: jupytext
        args: [--sync]
        files: ^python/examples/.*\.ipynb$
        pass_filenames: true
  - repo: local
    hooks:
      - id: check-copyright
        name: check copyright headers
        entry: scripts/check_copyright.py --modify
        language: script
        pass_filenames: true
        files: \.(h|cxx|py|sh|js)$
      - id: check-dependencies
        name: check dependency consistency
        entry: scripts/dep_manager.py check
        language: script
        pass_filenames: false
        always_run: true
