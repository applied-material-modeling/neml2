# Dependency registry for neml2.
# Use scripts/dep_manager.py to check and update these dependencies.
#
# Schema per entry:
#   DEP_NAME:
#     FIELD: VALUE          # any scalar field (version, version_min, ...)
#     files:                # source files that embed this dep's value fields
#       - RELATIVE_PATH     # one entry per file; all # dependencies: DEP.FIELD
#                           # annotations within it are updated automatically
#
# Annotation convention in source files:
#   # dependencies: DEP_NAME.FIELD
#   <line containing the version value>

# ---- Python packages ----
torch:
  version: "2.12.1"
  version_min: "2.10.0"
  version_max: "2.12.1"
  files:
    - .github/actions/neml2-ci/action.yaml
    - .github/workflows/cpp.yaml
    - .github/workflows/compat.yaml
    - .github/workflows/python.yaml
    - .github/workflows/notebooks.yaml
    - .github/workflows/docs.yaml
    - doc/content/installation/compatibility.yaml
    - pyproject.toml

pyzag:
  version: "1.1.3"
  files:
    - pyproject.toml
    - .github/workflows/compat.yaml

nmhit:
  version_min: "0.3.3"
  files:
    - pyproject.toml

clang_format:
  version: "v22.1.3"
  files:
    - .pre-commit-config.yaml

ruff:
  version: "0.15.20"
  files:
    - .pre-commit-config.yaml
    - pyproject.toml

pyright:
  version: "1.1.411"
  files:
    - pyproject.toml

pybind11_stubgen:
  version_min: "2.5.5"
  files:
    - pyproject.toml

questionary:
  version_min: "2.1.1"
  files:
    - pyproject.toml

# ---- Build tools ----
cmake:
  version_min: "3.26.1"
  files:
    - .github/actions/neml2-ci/action.yaml
    - CMakeLists.txt
    - .github/workflows/cpp.yaml
    - .github/workflows/python.yaml
    - .github/workflows/notebooks.yaml
    - .github/workflows/docs.yaml
    - pyproject.toml

python:
  version_min: "3.10"
  files:
    - .github/actions/neml2-ci/action.yaml
    - .github/workflows/deps.yaml
    - .github/workflows/dependabot_sync.yaml
    - .github/workflows/copyright.yaml
    - .github/workflows/cpp.yaml
    - .github/workflows/python.yaml
    - .github/workflows/notebooks.yaml
    - .github/workflows/docs.yaml
    - pyproject.toml

# ---- Project version ----
neml2:
  version: "3.0.6"
  files:
    - CMakeLists.txt
    - pyproject.toml

# ---- AOTI artifact metadata schema ----
# Bumped on any breaking change to the layout of ``<model>_meta.json``
# (the manifest the C++ loader at ``neml2/csrc/aoti/Model.cpp`` reads).
# The Python emitter (``neml2/cli/aoti_export.py``) and the C++ loader
# must agree, so both are tracked here alongside the documentation page
# that describes the schema. The example artifacts under
# ``doc/content/tutorials/models/compiled_models/`` are regenerated at
# tutorial-rebuild time and so are not tracked here.
aoti:
  schema_version: "7"
  files:
    - neml2/cli/aoti_export.py
    - neml2/csrc/aoti/Model.cpp
    - doc/content/references/aoti_packages.md
