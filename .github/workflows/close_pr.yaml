name: Clean up after pull request

on:
  pull_request_target:
    branches: [main]
    types: [closed]

jobs:
  delete-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: gh-pages
      - name: Delete preview
        run: |
          PREVIEW="pr-preview/${{ github.event.number }}"
          if [ ! -e "$PREVIEW" ]; then
            echo "No preview at $PREVIEW (never built or already removed); nothing to do."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git rm -r "$PREVIEW"
          if git diff --cached --quiet; then
            echo "No staged changes; nothing to commit."
            exit 0
          fi
          git commit -m 'Remove preview for PR #${{ github.event.number }}'
          git push origin gh-pages
      - name: Comment on the pull request
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview-link
          message: |
            Documentation preview removed.
            If this PR was merged, its changes are now in the [development documentation](https://applied-material-modeling.github.io/neml2/dev/); the latest release is at the [stable documentation](https://applied-material-modeling.github.io/neml2/stable/).
