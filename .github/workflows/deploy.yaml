name: Deploy documentation

on:
  workflow_run:
    workflows: ["Documentation"]
    types: [completed]

concurrency:
  group: docs-deploy-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Show upstream workflow information
        run: |
          echo "upstream workflow: ${{ github.event.workflow_run.name }}"
          echo "upstream event:    ${{ github.event.workflow_run.event }}"
          echo "upstream id:       ${{ github.event.workflow_run.id }}"
          echo "upstream sha:      ${{ github.event.workflow_run.head_sha }}"
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: documentation
          path: site/html
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # PR preview
      - name: Deploy preview to GitHub Pages
        if: github.event.workflow_run.event == 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: site/html
          target-folder: pr-preview/${{ github.event.workflow_run.pull_requests[0].number }}
      - name: Update comment with preview link
        if: github.event.workflow_run.event == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: doc-preview-link
          number: ${{ github.event.workflow_run.pull_requests[0].number }}
          message: |
            Documentation preview: <https://applied-material-modeling.github.io/neml2/pr-preview/${{ github.event.workflow_run.pull_requests[0].number }}>

      # Deploy to GitHub Pages, on release only. The live site then tracks the
      # released package (and the tag the Colab badges point to) rather than
      # every push to main, keeping the "Open in Colab" tutorials in lockstep
      # with the `pip install neml2` release. Pushes to main still build the
      # docs (for validation) but do not redeploy.
      - name: Deploy to GitHub Pages
        if: github.event.workflow_run.event == 'release'
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: site/html
          clean-exclude: pr-preview
          single-commit: true
