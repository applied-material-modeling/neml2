name: C++ backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Newer commits should cancel old runs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: clang-format --all-files --show-diff-on-failure -v

  # The C++ artifact shipped from this repo is the libneml2 shared
  # library. The matrix below verifies it configures and builds cleanly in
  # Debug and Release on every supported runner. Behavioral coverage of the
  # Python runtime lives in tests/ and is exercised by the `Python` workflow.
  build:
    needs: clang-format
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest, gpu_runner]
        btype: [Debug, Release]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/neml2-ci
        with:
          # dependencies: python.version_min
          python-version: "3.10"
          # dependencies: cmake.version_min
          cmake-version: "3.26.1"
          # dependencies: torch.version
          torch-version: "2.12.1"
          cpu-torch: ${{ matrix.runner != 'gpu_runner' && 'true' || 'false' }}
      - name: Configure
        if: matrix.btype == 'Release'
        run: cmake --preset dev -GNinja -DCMAKE_BUILD_TYPE=Release -S .
      - name: Configure (Werror)
        if: matrix.btype != 'Release'
        run: cmake --preset dev -GNinja -DCMAKE_BUILD_TYPE=${{ matrix.btype }} -DCMAKE_CXX_FLAGS="-Werror" -S .
      - name: Build libneml2
        run: cmake --build --preset dev

  # Benchmark smoke tests. Each scenario under benchmark/<name>/model.i is
  # compiled through neml2-compile and driven once at batch=2 via the
  # ctest entries registered in benchmark/CMakeLists.txt. Single Linux/CPU
  # runner -- every scenario runs with --device cpu, so adding macos /
  # gpu_runner would buy no new coverage and ~triple CI wall time.
  benchmark:
    needs: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/neml2-ci
        with:
          # dependencies: python.version_min
          python-version: "3.10"
          # dependencies: cmake.version_min
          cmake-version: "3.26.1"
          # dependencies: torch.version
          torch-version: "2.12.1"
          cpu-torch: true
      - name: Install neml2 (editable)
        run: pip install -e ".[dev]" -v
      - name: Configure dev preset
        run: cmake --preset dev -GNinja -S .
      - name: Run benchmark smoke tests
        # Parallel across scenarios: each has its own Inductor cache dir, and
        # heavy scenarios carry PROCESSORS=2 (set in benchmark/CMakeLists.txt)
        # so ctest's --parallel budget doesn't pile too many AOTI compiles onto
        # the runner at once. -j 4 matches the ubuntu-latest vCPU count.
        run: ctest --test-dir build/dev -L benchmark --output-on-failure --parallel 4

  # C++ dispatcher tests (tests/cpp): schedulers, batch slice/cat, async pool,
  # and the load_model / DispatchedModel end-to-end against a compiled fixture.
  # They live under the dev preset's tests/cpp targets, so the `build` job above
  # (which only builds libneml2) doesn't cover them. Runs on both ubuntu
  # (cpu) and the gpu_runner: the real CPU+GPU hybrid + write-through assertions
  # are runtime-gated on at::hasCUDA(), so they only fire on the GPU cell; the
  # cpu cell still covers single-device + async correctness, and MPISimpleScheduler
  # (no-MPI build) asserting its constructor throws.
  dispatcher:
    needs: clang-format
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, gpu_runner]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/neml2-ci
        with:
          # dependencies: python.version_min
          python-version: "3.10"
          # dependencies: cmake.version_min
          cmake-version: "3.26.1"
          # dependencies: torch.version
          torch-version: "2.12.1"
          cpu-torch: ${{ matrix.runner != 'gpu_runner' && 'true' || 'false' }}
      - name: Install neml2 (editable)
        # Makes `neml2` importable for the ctest fixture
        # (`python -m neml2.cli.aoti_compile`).
        run: pip install -e ".[dev]" -v
      - name: Configure dev preset
        run: cmake --preset dev -GNinja -S .
      - name: Build C++ dispatcher tests
        run: |
          cmake --build build/dev --target aoti \
            test_scheduler test_batch_chunk test_static_hybrid_scheduler test_exceptions \
            test_dispatcher test_load_model -j 4
      - name: Run C++ dispatcher tests
        run: ctest --test-dir build/dev -L dispatcher --output-on-failure --parallel 4
