name: C++ backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Newer commits should cancel old runs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: clang-format --all-files --show-diff-on-failure -v

  # The C++ artifact shipped from this repo is the libneml2 shared
  # library. The matrix below verifies it configures and builds cleanly in
  # Debug and Release on every supported runner. Behavioral coverage of the
  # Python runtime lives in tests/ and is exercised by the `Python` workflow.
  # This is a pure compile check, so it drives CMake directly (torch + nmhit
  # come from the neml2-ci action) rather than going through pip.
  build:
    needs: clang-format
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-26, gpu_runner]
        btype: [Debug, Release]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/neml2-ci
        with:
          # dependencies: python.version_min
          python-version: "3.10"
          # dependencies: cmake.version_min
          cmake-version: "3.26.1"
          # dependencies: torch.version
          torch-version: "2.12.1"
          cpu-torch: ${{ matrix.runner != 'gpu_runner' && 'true' || 'false' }}
      - name: Configure
        if: matrix.btype == 'Release'
        run: cmake -S . -B build/check -GNinja -DCMAKE_BUILD_TYPE=Release
      - name: Configure (Werror)
        if: matrix.btype != 'Release'
        run: cmake -S . -B build/check -GNinja -DCMAKE_BUILD_TYPE=${{ matrix.btype }} -DCMAKE_CXX_FLAGS="-Werror"
      - name: Build libneml2
        run: cmake --build build/check --target aoti

  # Windows/MSVC build (neml2 issue #414). Windows is a best-effort,
  # source-build-only platform -- no wheels are published -- so this job just
  # proves neml2 compiles, installs, imports, and can be consumed from a
  # downstream C++ project via find_package(neml2). Non-blocking while the MSVC
  # port stabilizes (continue-on-error); flip to required once it is green. Runs
  # in PowerShell (the Windows default shell) and lets scikit-build-core drive the
  # Visual Studio generator, which locates the MSVC toolset itself -- so no
  # developer-environment setup is needed. ninja is intentionally NOT installed:
  # the Ninja generator would then need cl.exe on PATH (a dev shell), whereas the
  # VS generator does not.
  windows:
    needs: clang-format
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          # dependencies: python.version_min
          python-version: "3.10"
      - name: Install build + runtime dependencies
        # torch (CPU) and nmhit ship the libtorch / libnmhit the C++ build links
        # against, so both must be present before the build. On Windows nmhit
        # resolves to its first wheel-shipping release (>= 0.3.5).
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core
          # dependencies: torch.version
          pip install torch==2.12.1 --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple
          # dependencies: nmhit.version_min
          pip install "nmhit>=0.3.3"
      - name: Build + install neml2
        # Non-editable so the shipped CMake package config lands in site-packages
        # for the downstream consumer step below.
        run: pip install . --no-build-isolation -v
      - name: Import smoke test
        run: python -c "import neml2; print('neml2', neml2.__version__)"
      - name: Downstream C++ consumer via find_package(neml2)
        run: |
          $prefix = python -c "import sysconfig, os; print(os.path.join(sysconfig.get_path('platlib'), 'neml2'))"
          $torchlib = python -c "import torch, os; print(os.path.join(os.path.dirname(torch.__file__), 'lib'))"
          cmake -S tests/downstream -B build/downstream -Dneml2_DIR="$prefix/share/cmake/neml2"
          cmake --build build/downstream --config Release
          # No rpath on Windows: put neml2.dll + the torch DLLs on PATH so the
          # consumer resolves them at run time.
          $env:PATH = "$prefix\lib;$torchlib;$env:PATH"
          & "build/downstream/Release/consumer.exe"

  # Benchmark smoke tests. Each scenario under benchmark/<name>/model.i is
  # compiled through neml2-compile and driven once at batch=2 via the
  # ctest entries registered in benchmark/CMakeLists.txt. Single Linux/CPU
  # runner -- every scenario runs with --device cpu, so adding macos /
  # gpu_runner would buy no new coverage and ~triple CI wall time.
  benchmark:
    needs: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/neml2-ci
        with:
          # dependencies: python.version_min
          python-version: "3.10"
          # dependencies: cmake.version_min
          cmake-version: "3.26.1"
          # dependencies: torch.version
          torch-version: "2.12.1"
          cpu-torch: true
      - name: Install neml2 (editable)
        # The editable install builds libneml2 + the pybind bindings + the C++
        # test/benchmark executables into build/editable, and makes `neml2`
        # importable for the neml2-compile fixtures. --no-build-isolation builds
        # against the torch the action installed.
        run: |
          pip install scikit-build-core ninja
          pip install -e ".[dev]" -v --no-build-isolation
      - name: Run benchmark smoke tests
        # Parallel across scenarios: each has its own Inductor cache dir, and
        # heavy scenarios carry PROCESSORS=2 (set in benchmark/CMakeLists.txt)
        # so ctest's --parallel budget doesn't pile too many AOTI compiles onto
        # the runner at once. -j 4 matches the ubuntu-latest vCPU count.
        run: ctest --test-dir build/editable -L benchmark --output-on-failure --parallel 4

  # C++ dispatcher tests (tests/cpp): schedulers, batch slice/cat, async pool,
  # and the load_model / DispatchedModel end-to-end against a compiled fixture,
  # plus the embedded-Python eager test. The editable install builds them (the
  # `cpp_tests` aggregate target). Runs on both ubuntu (cpu) and the gpu_runner:
  # the real CPU+GPU hybrid + write-through assertions are runtime-gated on
  # at::hasCUDA(), so they only fire on the GPU cell; the cpu cell still covers
  # single-device + async correctness, and MPISimpleScheduler (no-MPI build)
  # asserting its constructor throws.
  dispatcher:
    needs: clang-format
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, gpu_runner]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/neml2-ci
        with:
          # dependencies: python.version_min
          python-version: "3.10"
          # dependencies: cmake.version_min
          cmake-version: "3.26.1"
          # dependencies: torch.version
          torch-version: "2.12.1"
          cpu-torch: ${{ matrix.runner != 'gpu_runner' && 'true' || 'false' }}
      - name: Install neml2 (editable, builds the C++ tests)
        # Builds libneml2 + the pybind bindings + the C++ test executables, and
        # makes `neml2` importable both for the ctest AOTI compile fixture and the
        # embedded interpreter test_eager hosts.
        run: |
          pip install scikit-build-core ninja
          pip install -e ".[dev]" -v --no-build-isolation
      - name: Run C++ dispatcher tests
        run: ctest --test-dir build/editable -L dispatcher --output-on-failure --parallel 4
      - name: Run C++ eager test
        run: ctest --test-dir build/editable -L eager --output-on-failure

  # Downstream C++ integration: build a wheel, install it, and consume it exactly
  # as an external project would -- find_package(neml2) and pkg-config against the
  # installed package, compiling + linking tests/downstream. Guards the packaging
  # contract (shipped headers + CMake config + pkg-config files) that the in-tree
  # build jobs above never exercise.
  downstream:
    needs: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/neml2-ci
        with:
          # dependencies: python.version_min
          python-version: "3.10"
          # dependencies: cmake.version_min
          cmake-version: "3.26.1"
          # dependencies: torch.version
          torch-version: "2.12.1"
          cpu-torch: true
      - name: Build + install the wheel
        run: |
          pip install scikit-build-core ninja
          pip wheel . --no-deps --no-build-isolation -w dist
          pip install dist/*.whl
      # Resolve the installed package via sysconfig, NOT `import neml2`: this step
      # runs from the repo root, where the source `neml2/` would shadow the wheel
      # on sys.path and point us at a tree with no installed headers/config.
      # No LD_LIBRARY_PATH on the runs -- the install is self-contained at runtime:
      # find_package bakes rpaths to neml2/lib + torch/lib via CMake, and
      # pkg-config bakes them via neml2-core.pc / neml2-torch.pc. neml2 and torch
      # are siblings in site-packages, so the torch rpath is relative to the .pc.
      - name: Consume via find_package(neml2)
        run: |
          PREFIX="$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))')/neml2"
          cmake -S tests/downstream -B build/downstream -GNinja -Dneml2_DIR="$PREFIX/share/cmake/neml2"
          cmake --build build/downstream
          ./build/downstream/consumer
      - name: Consume via pkg-config
        run: |
          PREFIX="$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))')/neml2"
          export PKG_CONFIG_PATH="$PREFIX/share/pkgconfig"
          c++ tests/downstream/main.cpp -o consumer_pc $(pkg-config --cflags --libs neml2)
          ./consumer_pc

  # C++ source-based coverage (clang). Builds the runtime + tests under
  # -DCMAKE_BUILD_TYPE=Coverage, runs the dispatcher + eager ctests under
  # instrumentation, and uploads to Codecov under the `cpp` flag. Runs on both
  # ubuntu (cpu paths) and the gpu_runner (the at::hasCUDA() cross-device / hybrid
  # / write-through branches; CUDA runs fine under coverage, unlike TSan). Codecov
  # merges the two uploads by flag. Named cpp-coverage (not coverage) to avoid
  # colliding with the Python `coverage` job in python.yaml.
  cpp-coverage:
    needs: clang-format
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, gpu_runner]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install clang + llvm
        run: |
          sudo apt-get update
          # patchelf: cpp_coverage.sh stages a SONAME-patched copy of the
          # instrumented libneml2 so the Python AOTI suite (driven through the
          # pybind binding) loads the instrumented runtime via LD_PRELOAD.
          sudo apt-get install -y clang llvm patchelf
          ver=$(clang --version | grep -oP 'clang version \K[0-9]+' | head -1)
          echo "LLVM_PROFDATA=llvm-profdata-$ver" >> "$GITHUB_ENV"
          echo "LLVM_COV=llvm-cov-$ver" >> "$GITHUB_ENV"
      - uses: ./.github/actions/neml2-ci
        with:
          # dependencies: python.version_min
          python-version: "3.10"
          # dependencies: cmake.version_min
          cmake-version: "3.26.1"
          # dependencies: torch.version
          torch-version: "2.12.1"
          cpu-torch: ${{ matrix.runner != 'gpu_runner' && 'true' || 'false' }}
      - name: Install neml2 (editable, Coverage, clang)
        # The C++ runtime + tests build under source-based coverage; `neml2` is
        # importable for the ctest AOTI compile fixture.
        env:
          CC: clang
          CXX: clang++
        run: |
          pip install scikit-build-core ninja
          pip install -e ".[dev]" -v --no-build-isolation \
            --config-settings=cmake.build-type=Coverage
      - name: Run coverage
        run: scripts/cpp_coverage.sh build/editable
      - name: Upload C++ coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: build/editable/coverage/coverage.lcov
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false            # Codecov outage shouldn't break PRs
          flags: cpp

  # ThreadSanitizer build (clang). The async dispatch pool spawns worker threads,
  # so this guards its synchronization (results/errors/load bookkeeping, the task
  # queue, the scheduler mutex/cv). The pip libtorch is not TSan-instrumented, so
  # torch noise is silenced via tests/cpp/tsan_suppressions.txt + OMP_NUM_THREADS=1;
  # races in neml2's own code still fail the job.
  tsan:
    needs: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
      - uses: ./.github/actions/neml2-ci
        with:
          # dependencies: python.version_min
          python-version: "3.10"
          # dependencies: cmake.version_min
          cmake-version: "3.26.1"
          # dependencies: torch.version
          torch-version: "2.12.1"
          cpu-torch: true
      - name: Install neml2 (editable, ThreadSanitizer, clang)
        env:
          CC: clang
          CXX: clang++
        run: |
          pip install scikit-build-core ninja
          pip install -e ".[dev]" -v --no-build-isolation \
            --config-settings=cmake.build-type=ThreadSanitizer
      - name: Run C++ tests under ThreadSanitizer
        # cpu-torch means at::hasCUDA() is false, so test_dispatcher's GPU block
        # is skipped (CUDA cannot run under TSan anyway). ignore_noninstrumented_modules
        # drops races whose accesses live entirely in the uninstrumented torch;
        # the suppressions file covers the rest. neml2's own races still fail.
        env:
          OMP_NUM_THREADS: "1"
          TSAN_OPTIONS: "suppressions=${{ github.workspace }}/tests/cpp/tsan_suppressions.txt ignore_noninstrumented_modules=1"
        run: ctest --test-dir build/editable -L dispatcher --output-on-failure
