# Torch compatibility matrix.
#
# Pull requests run a lean subset (torch x python extremes per OS) for a fast,
# low-noise signal; pushes to main and manual dispatch run the FULL matrix
# (3 torch x 5 python x 2 OS). The matrix JSON is generated by
# scripts/compat_matrix.py (see its --mode flag).
name: Torch compatibility

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Newer commits should cancel old runs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          # dependencies: python.version_min
          python-version: "3.10"
      - run: pip install pyyaml
      - name: Check compatibility.yaml
        run: python scripts/compat_matrix.py check
      - name: Check dependencies.yaml
        run: python scripts/dep_manager.py check
      - name: Check rendered doc table is in sync
        run: python scripts/compat_matrix.py render --in-place doc/content/installation/compatibility.md --check

  matrix:
    needs: guard
    runs-on: ubuntu-latest
    outputs:
      wheel_matrix: ${{ steps.set.outputs.wheel_matrix }}
      test_matrix: ${{ steps.set.outputs.test_matrix }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          # dependencies: python.version_min
          python-version: "3.10"
      - run: pip install pyyaml
      - id: set
        # PR -> lean subset (torch x python extremes); push to main /
        # workflow_dispatch -> full matrix.
        env:
          MODE: ${{ github.event_name == 'pull_request' && 'pr' || 'full' }}
        run: |
          echo "wheel_matrix=$(python scripts/compat_matrix.py expand --kind wheel --mode "$MODE")" >> "$GITHUB_OUTPUT"
          echo "test_matrix=$(python scripts/compat_matrix.py expand --kind test --mode "$MODE")" >> "$GITHUB_OUTPUT"

  build-wheel:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.wheel_matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Free disk space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      # Install Python, CMake, system deps, and the build-time torch (same
      # version the cibuildwheel-published wheels are compiled against).
      - uses: ./.github/actions/neml2-ci
        with:
          python-version: ${{ matrix.python }}
          # dependencies: cmake.version_min
          cmake-version: "3.26.1"
          # dependencies: torch.version
          torch-version: "2.12.1"
      - name: Install build deps
        run: pip install scikit-build-core ninja wheel auditwheel pybind11-stubgen build
      - name: Build wheel
        run: python -m build --wheel --no-isolation --outdir wheelhouse-raw
      - name: Repair wheel (auditwheel + stubs)
        # Same script cibuildwheel invokes, so the artifact is byte-equivalent
        # to what we publish to PyPI (modulo the platform tag — see notes in
        # repair_wheel.py).
        run: python scripts/repair_wheel.py wheelhouse-raw/*.whl wheelhouse
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-py${{ matrix.python }}-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 7

  test:
    needs: [matrix, build-wheel]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.test_matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v8
        with:
          name: wheel-py${{ matrix.python }}-${{ matrix.os }}
          path: wheelhouse
      - name: Install torch (runtime version under test)
        # Pinning the runtime torch BEFORE installing the neml2 wheel keeps
        # pip's resolver from upgrading torch on us: pyproject.toml has no
        # torch version constraint, so the pinned version sticks.
        run: |
          if [ "${{ matrix.channel }}" = "cuda" ]; then
            # cuda-runtime row (Linux only): install the default-index CUDA build.
            # The wheel was built against CPU torch; this asserts it still imports
            # and cpu-tests cleanly under a cuda torch -- the ABI / DT_NEEDED check
            # that the cpu-only AOTI-import bug would have failed. GPU kernels are
            # NOT exercised (GitHub runners have no GPU).
            pip install torch==${{ matrix.torch }}
          elif [ "${{ runner.os }}" = "Linux" ]; then
            # --extra-index-url keeps PyPI as a fallback so torch deps the PyTorch
            # CPU index doesn't mirror (mpmath, fsspec, ...) still resolve.
            pip install torch==${{ matrix.torch }} --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple
          else
            pip install torch==${{ matrix.torch }}
          fi
      - name: Install neml2 wheel
        run: pip install wheelhouse/*.whl
      - name: Install test deps
        # dependencies: pyzag.version
        run: pip install pytest "pyzag==1.1.4"
      - name: Confirm import + torch version under test
        # Run from a neutral dir, NOT the repo root: the checked-out source tree
        # has a `neml2/` package with no compiled `_aoti` extension, and CWD on
        # sys.path would shadow the installed wheel we mean to test. `import neml2`
        # deliberately SWALLOWS a failed AOTI-binding import (it is optional), so
        # it alone would stay green even when libneml2 cannot load against this
        # torch -- explicitly import the binding to assert it loaded. This is the
        # line that catches the cpu-only / cross-channel ABI bug.
        working-directory: ${{ runner.temp }}
        run: |
          python - <<'EOF'
          import torch, neml2
          from neml2.aoti import Model  # must NOT raise: the AOTI binding loaded
          print(f"torch: {torch.__version__}")
          print(f"neml2: {neml2.__file__}")
          print(f"aoti : {Model.__module__}.{Model.__name__}")
          EOF
      - name: Run pytest
        run: pytest -v --junitxml=pytest.xml tests
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Compatibility row"
            echo ""
            echo "| field   | value |"
            echo "| ------- | ----- |"
            echo "| torch   | ${{ matrix.torch }} |"
            echo "| python  | ${{ matrix.python }} |"
            echo "| os      | ${{ matrix.os }} |"
            echo "| channel | ${{ matrix.channel }} |"
          } >> "$GITHUB_STEP_SUMMARY"
