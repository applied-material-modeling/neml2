name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Newer commits should cancel old runs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  notebook-sync:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # jupytext in pre-commit mode reads git commit timestamps to
          # decide which file to regenerate from.
          fetch-depth: 0
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: jupytext --all-files --show-diff-on-failure -v

  documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/neml2-ci
        with:
          # dependencies: python.version_min
          python-version: "3.10"
          # dependencies: cmake.version_min
          cmake-version: "3.26.1"
          # dependencies: torch.version
          torch-version: "2.12.0"
      - name: Install NEML2 + dev extras (sphinx, shibuya, myst-nb, ...)
        run: pip install ".[dev]" -v
      - name: Build documentation (strict — warnings are errors)
        run: sphinx-build -j auto -W --keep-going -b html doc doc/_build/html
      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: doc/_build/html
