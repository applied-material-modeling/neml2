<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 470" width="660" height="470" role="img" aria-label="The six NEML2 evaluation routes arranged as a host by mode matrix">
<title>NEML2 evaluation routes — host × mode matrix</title>
<defs>
<marker id="ah" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
<path class="ah" d="M0,0 L6,3 L0,6 Z"/>
</marker>
</defs>
<style>text { font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
.mono { font-family: ui-monospace,'SF Mono', Menlo, Consolas, monospace; font-size: 0.92em; }
.t { fill:#1c2024; } .m { fill:#62656c; } .sub { fill:#8b8d98; letter-spacing:.02em; }
.ttl { fill:#5b5bd6; letter-spacing:.08em; }
.bx  { fill:#ffffff; stroke:#d9d9e0; stroke-width:1.4; }
.bxa { fill:#ffffff; stroke:#5b5bd6; stroke-width:1.8; }
.stp { fill:#ffffff; stroke:#e3e3e9; stroke-width:1.2; }
.io  { fill:#f1f1fb; stroke:#d2d2ea; stroke-width:1.3; }
.cont{ fill:#f7f7fb; stroke:#dadae3; stroke-width:1.3; stroke-dasharray:5 4; }
.ln  { stroke:#bcbccb; stroke-width:1.6; }
.ah  { fill:#bcbccb; }
.badge { fill:#5b5bd6; } .bt { fill:#ffffff; }
@media (prefers-color-scheme: dark) {
  .t { fill:#ecedef; } .m { fill:#9fa3ab; } .sub { fill:#8a8d96; }
  .ttl { fill:#ada4ff; }
  .bx  { fill:#202127; stroke:#34373f; }
  .bxa { fill:#202127; stroke:#9d92f0; }
  .stp { fill:#1c1d22; stroke:#33363d; }
  .io  { fill:#1c1d2b; stroke:#3a3a55; }
  .cont{ fill:#17181d; stroke:#2c2f36; }
  .ln  { stroke:#474b53; } .ah { fill:#474b53; }
  .badge { fill:#7c75e8; }
}</style>

<!-- authoring node -->
<rect x="190" y="24" width="280" height="56" rx="10" class="bxa"/>
<text x="330" y="47" class="t" font-size="13.5" text-anchor="middle" font-weight="600">Python Model (torch.nn.Module)</text>
<text x="330" y="65" class="m" font-size="10" text-anchor="middle">authored once · the only authoring surface</text>

<!-- fan-out to the two host columns -->
<line x1="330" y1="80" x2="330" y2="94" class="ln"/>
<line x1="229" y1="94" x2="500" y2="94" class="ln"/>
<line x1="229" y1="94" x2="229" y2="108" class="ln" marker-end="url(#ah)"/>
<line x1="500" y1="94" x2="500" y2="108" class="ln" marker-end="url(#ah)"/>

<!-- column headers -->
<text x="229" y="122" class="sub" font-size="11" text-anchor="middle" font-weight="600">Python host</text>
<text x="500" y="122" class="sub" font-size="11" text-anchor="middle" font-weight="600">C++ host</text>

<!-- row labels (mode axis) -->
<text x="92" y="164" class="t" font-size="11" text-anchor="end" font-weight="700">eager</text>
<text x="92" y="178" class="sub" font-size="9" text-anchor="end">no compile</text>
<text x="92" y="242" class="t" font-size="11" text-anchor="end" font-weight="700">torch.compile</text>
<text x="92" y="256" class="sub" font-size="9" text-anchor="end">in-process</text>
<text x="92" y="342" class="t" font-size="11" text-anchor="end" font-weight="700">AOTI</text>
<text x="92" y="356" class="sub" font-size="9" text-anchor="end">neml2-compile</text>

<!-- row 1: eager -->
<rect x="104" y="132" width="248" height="70" rx="10" class="bx"/>
<text x="120" y="160" class="ttl mono" font-size="13" text-anchor="start" font-weight="700">py-eager</text>
<text x="120" y="179" class="m mono" font-size="10.5" text-anchor="start">neml2.load_model</text>
<text x="120" y="194" class="sub" font-size="9.5" text-anchor="start">eager PyTorch · full autograd</text>

<rect x="364" y="132" width="272" height="70" rx="10" class="bx"/>
<text x="380" y="160" class="ttl mono" font-size="13" text-anchor="start" font-weight="700">cpp-eager</text>
<text x="380" y="179" class="m mono" font-size="10.5" text-anchor="start">neml2::eager::Model</text>
<text x="380" y="194" class="sub" font-size="9.5" text-anchor="start">embedded CPython · plain-batch only</text>

<!-- row 2: torch.compile -->
<rect x="104" y="210" width="248" height="70" rx="10" class="bx"/>
<text x="120" y="238" class="ttl mono" font-size="13" text-anchor="start" font-weight="700">py-jit</text>
<text x="120" y="257" class="m mono" font-size="10.5" text-anchor="start">neml2.compile</text>
<text x="120" y="272" class="sub" font-size="9.5" text-anchor="start">in-process graph · pyzag loops</text>

<rect x="364" y="210" width="272" height="70" rx="10" class="cont"/>
<text x="500" y="247" class="m" font-size="20" text-anchor="middle">—</text>
<text x="500" y="268" class="sub" font-size="9.5" text-anchor="middle">no in-process compile in C++</text>

<!-- row 3: AOTI (taller; C++ cell holds two routes) -->
<rect x="104" y="288" width="248" height="116" rx="10" class="bx"/>
<text x="120" y="338" class="ttl mono" font-size="13" text-anchor="start" font-weight="700">py-aoti</text>
<text x="120" y="357" class="m mono" font-size="10.5" text-anchor="start">neml2.aoti.Model</text>
<text x="120" y="372" class="sub" font-size="9.5" text-anchor="start">pybind over libneml2.so</text>
<text x="120" y="386" class="sub" font-size="9.5" text-anchor="start">+ AOTIModel HIT shim</text>

<rect x="364" y="288" width="272" height="116" rx="10" class="bx"/>
<text x="380" y="318" class="ttl mono" font-size="13" text-anchor="start" font-weight="700">cpp-aoti</text>
<text x="380" y="336" class="m mono" font-size="10" text-anchor="start">neml2::aoti::Model</text>
<line x1="380" y1="350" x2="620" y2="350" class="ln" stroke-width="1"/>
<text x="380" y="375" class="ttl mono" font-size="13" text-anchor="start" font-weight="700">cpp-dispatch</text>
<text x="620" y="375" class="sub" font-size="9" text-anchor="end">multi-device</text>
<text x="380" y="393" class="m mono" font-size="10" text-anchor="start">neml2::aoti::DispatchedModel</text>

<!-- footnote -->
<text x="330" y="434" class="m" font-size="9.5" text-anchor="middle">All six routes share one forward / jvp / jacobian surface over the same authored model.</text>
<text x="330" y="450" class="sub" font-size="9.5" text-anchor="middle">cpp-eager is plain-batch only; every other route supports sub-batch.</text>
</svg>
